<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./cadastro.css">
    <script src="./main.js" defer></script>
   
    <title>Cadastro</title>
</head>
<body>

    <section>

        <header>
        <nav>
            <ul class="menu" id="menu">
                <img class="configuracao" src="imgCadastro/configuracao.png">

                <li><a href="#inicio">Início</a></li>
                <li><a href="#sobre">Sobre</a></li>
                <li><a href="#ajuda">Ajuda</a></li>
            </ul>
        </nav>

                
        <div class="conteudo"> 
            <div class="container">
    
                <div class="register">
                    <h2>Cadastro da Empresa</h2>
                </div>
        
                <div class="inputs">

                    <div class="texto">
                        <h1>Comece a Gerenciar Sua Empresa</h1>
                        <h3>Preencha os dados abaixo para criar sua conta corporativa.</h3>
                    </div>

                    <div class="passo">
                        <img src="imgCadastro/passo.png">
                    </div>

                    <div class="passo1">
                    <h3>Passo1:</h3>
                    <h2>Dados Básicos</h2>
                </div>

                    <div class="cont1">
                        <input type="text" id="nome" placeholder="Email Corporativo:">
                    </div>

                    <div class="cont2">
                        <input type="text" id="email" placeholder="Nome da Empresa:">
                    </div>

                    <div class="cont3">
                        <input type="password" id="senha" placeholder="CNPJ:">
                    </div>

                    <div class="cont4">
                        <input type="text" id="premium" placeholder="Senha:">

                    </div>

                    <div class="cont6">
                        <input type="password" id="senhaRecuperacao" placeholder="Confirmar senha:">

                    </div>

                </div>

               <button id="botao" onclick="location.assign('login.html')">Próximo Passo</button>
                
                <div class="login">
                    <h3>Já tem uma conta?</h3>
                    <h2><a href="login.html">Login</a></h2>
                </div>

         </header>
     </section>
    
</body>
</html>
